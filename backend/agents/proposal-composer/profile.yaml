id: proposal-composer
name: "Proposal Composer"
description: "Cross-region proposal drafting with MDM catalog, templates, and deterministic pricing."

model_provider: azure_anthropic
model: ${CLAUDE_AZURE_FOUNDRY_MODEL}
prompt_file: system_prompt.md
skills_dir: skills

mcp_servers:
  postgres:
    env:
      DATABASE_URL: ${DATABASE_URL}
      DB_READ_ONLY: "true"

allowed_tools:
  - list_templates
  - read_knowledge
  - initialize_proposal_draft
  - get_proposal_draft
  - patch_proposal_draft
  - add_package_to_proposal_draft
  - add_service_to_proposal_draft
  - enable_proposal_draft_section
  - render_preview
  - generate_document
  - postgres_list_tables
  - postgres_describe_table
  - postgres_get_schema
  - postgres_query_data

hooks:
  proposal_persist: {}
  sql_validator:
    max_rows: 500
  result_truncator:
    max_observation_bytes: 50000

memory:
  working_set_turns: 20
  cold_resume_max_turns: 12
