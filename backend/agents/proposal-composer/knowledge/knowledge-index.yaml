# 知识索引 — 仅用于「选型 → 知识条目」解析（required doc、credential 等）
# 静态模版块由 templates/*/template.yaml 的 draft sections 直接指向文件

entries:
  passport-bvi:
    kind: required_doc
    title: Certified passport copy
    path: peripheral/required-docs/BVI/passport.md
    jurisdiction: BVI

  utility-bill-bvi:
    kind: required_doc
    title: Proof of address (utility bill or bank statement)
    path: peripheral/required-docs/BVI/utility-bill.md
    jurisdiction: BVI

triggers:
  # required docs：按 MDM service_name 匹配（非 template 写死 incorporation 章节）
  - match:
      jurisdiction: BVI
      bu: Harneys
      service_name: Incorporation
    add: [passport-bvi, utility-bill-bvi]

  - match:
      jurisdiction: BVI
      bu: Harneys
      service_name: Transfer in
    add: [passport-bvi, utility-bill-bvi]

  # additional_info 是 draft optional section；是否启用由对话意图或后续规则决定
