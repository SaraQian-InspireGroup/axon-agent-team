template_id: au-advisory
display_name: Australia Advisory
catalog_filter:
  region: AU
  bu: Incorp

sections:
  - id: introduction
    kind: static_block
    title: About Incorp
    required: true
    editable: false
    source:
      type: template_file
      file: blocks/introduction-au-advisory.md

  - id: solution_and_fees
    kind: fee_section
    title: Solution and professional fees
    required: true
    materializer: mdm_fee_tables
    fee_layout:
      group_by: package
      table_style: frequency_columns
      currency: AUD
      show_line_amount: true
      include_scope_of_work: true
    intro:
      source:
        type: template_file
        file: blocks/fee-description-au-advisory.md
      editable: true

  - id: payment_options
    kind: derived_section
    title: Fee summary
    required: false
    default_enabled: false
    derivation:
      type: payment_options_from_fee_tables
      source_section: solution_and_fees
    intro:
      source:
        type: template_file
        file: blocks/payment-option-intro-au-advisory.md
      editable: true

  - id: credentials
    kind: collection
    title: Credentials
    required: false
    default_enabled: false
    add_policy:
      resolver: session_pick
      kind: credential

  - id: appendix
    kind: markdown_block
    title: Appendix
    required: false
    default_enabled: false
    editable: true

  - id: terms
    kind: static_block
    title: Terms and conditions
    required: true
    editable: false
    source:
      type: template_file
      file: blocks/terms-au-advisory.md

document_title:
  prefix: INCORP ADVISORY PROPOSAL
  name_from:
    - client.company_name
    - client.contract_name
  fallback: INCORP ADVISORY PROPOSAL
