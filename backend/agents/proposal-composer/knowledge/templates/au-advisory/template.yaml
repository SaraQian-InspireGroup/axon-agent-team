template_id: au-advisory
category_id: au-services
display_name: Australia Tax and Advisory
body: proposal.md

document_title:
  prefix: INCORP ADVISORY PROPOSAL
  name_from:
    - client.company_name
    - client.contract_name
  fallback: INCORP ADVISORY PROPOSAL

placeholders:
  client.company_name:
    type: state
    path: client.company_name
    required: false

  client.contract_name:
    type: state
    path: client.contract_name
    required: false

  client.contact_name:
    type: state
    path: client.contact_name
    required: false

  static.introduction:
    type: static
    file: blocks/introduction-au-advisory.md
    required: true

  solution_and_price:
    type: solution_and_price
    title: Solution and professional fees
    required: true
    fee_description:
      file: blocks/fee-description-au-advisory.md
    fee_layout:
      group_by: package
      table_style: frequency_columns
      currency: AUD
      show_line_amount: true
    include_scope_of_work: true

  payment_options:
    type: payment_options
    title: Fee summary
    required: false
    intro_file: blocks/payment-option-intro-au-advisory.md

  knowledge.credentials:
    type: knowledge
    resolver: session_pick
    kind: credential
    required: false

  session.appendix:
    type: session
    path: appendix
    required: false

  static.terms:
    type: static
    file: blocks/terms-au-advisory.md
    required: true

optional_sections:
  - id: payment_options
    title: Fee summary
    placeholder: payment_options
    trigger:
      any_of:
        - enabled_sections: [payment_options]

  - id: credentials
    title: Credentials
    placeholder: knowledge.credentials
    trigger:
      any_of:
        - enabled_sections: [credentials]

  - id: appendix
    title: Appendix
    placeholder: session.appendix
    trigger:
      any_of:
        - enabled_sections: [appendix]
    page_break: true
