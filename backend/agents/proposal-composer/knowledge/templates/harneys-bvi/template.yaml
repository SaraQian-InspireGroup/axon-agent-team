template_id: harneys-bvi
display_name: Harneys BVI Corporate Services
catalog_filter:
  region: BVI
  bu: Harneys

sections:
  - id: introduction
    kind: markdown_block
    title: Introduction
    required: true
    editable: true
    content: "Harneys Fiduciary is pleased to provide this proposal for British Virgin Islands corporate and fiduciary services."

  - id: solution_and_fees
    kind: fee_section
    title: Solution and pricing
    required: true
    materializer: mdm_fee_tables
    fee_layout:
      group_by: service_group
      show_line_amount: true
      show_recurring: true

  - id: required_documents
    kind: markdown_block
    title: Required documents
    required: false
    default_enabled: false
    editable: true

  - id: additional_info
    kind: static_block
    title: Additional information
    required: false
    default_enabled: false
    editable: false
    source:
      type: template_file
      file: blocks/additional-info-bvi.md

  - id: terms
    kind: static_block
    title: Terms and conditions
    required: true
    editable: false
    source:
      type: template_file
      file: blocks/terms-bvi.md

document_title:
  prefix: Proposal
  name_from:
    - client.company_name
    - client.contract_name
  fallback: Proposal
